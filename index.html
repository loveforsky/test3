<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio Website </title>
    <style>
        html, body{
            height: 100%;
            margin: 0;
        }
        body{
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            overflow: auto;
        }
        body::before{
            content: "";
            position: fixed;
            inset: 0;
            background-image: url('background.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.3; 
            z-index: -1;
            pointer-events: none;
        }
        .headline {
                background-color: #b3b2b2;
                text-align:center;
                padding: 40px;
                font-family: "Berlin Sans SB", serif;
        }
        .headline h1{
            font-size:48px;
            margin-bottom:10px;
        }
        .headline p{
            font-size:20px;
        }
        .content{
            max-width:800px;
            margin: 0 auto;
            padding: 40px 20px;
            font-size:large;
            font-weight: bold;
            line-height:1.6;
            font-family: "Berlin Sans SB", serif;
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .content a{
            display: list-item;
            list-style-type: disc;
            list-style-position: inside;
            margin-left: 1.2em;
            line-height: 4.0;
            text-decoration: none;
        }
        a:link{
            color: #333;
        }
        a:visited{
            color: #333;
        }
        a:hover,a:active{
            color: #3c78e7;
        }
        .footer{
            background-color: #b3b2b2;
            text-align:center;
            padding:20px;
            font-family: "Berlin Sans SB", serif;
            font-size:20px;
            flex: 0 0 auto;
        }
    </style>
</head>
<body>
  <div class="headline">
    <h1>Welcome to My Portfolio</h1>
    <p>Discover my projects , skills and contact information</p>
  </div>
  <div class="content">
    <a href="self-intro.html" target="_blank">self introduction</a>
    <a href="skills.html" target="_blank">skills and expertise</a>
    <a href="project.html" target="_blank">project showcase</a>
    <a href="contact.html" target="_blank">contact information</a>
    </div>
<div class="footer">
    <p>&copy; 2026 Yao. All rights reserved.</p>
  </div>

</body>
</html>
